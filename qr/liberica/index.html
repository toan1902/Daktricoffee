:root {
  color-scheme: light;
  --green:      #2e6b3f;
  --green-dark: #1a4025;
  --cream:      #ffffff;
  --gold:       #c9a84c;
  --ink:        #1a4025;
}

body {
  background: var(--cream);
  font-family: 'Be Vietnam Pro', sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}

/* Grain */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.035; pointer-events: none; z-index: 0;
}

/* Radial glow */
body::after {
  content: '';
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(46,107,63,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* Rings */
.rings {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 0;
}
.ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(46,107,63,0.1);
  animation: ripple 5s ease-in-out infinite;
}
.ring:nth-child(1) { width:220px; height:220px; animation-delay:0s; }
.ring:nth-child(2) { width:380px; height:380px; animation-delay:0.8s; }
.ring:nth-child(3) { width:540px; height:540px; animation-delay:1.6s; }
.ring:nth-child(4) { width:700px; height:700px; animation-delay:2.4s; }
@keyframes ripple {
  0%,100% { opacity:0.3; transform:scale(0.98); }
  50%      { opacity:0.8; transform:scale(1.02); }
}

/* Card */
.card {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
  padding: 0 40px; text-align: center;
  max-width: 360px; width: 100%;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Logo */
.logo-wrap {
  width: 160px; height: 160px;
  border-radius: 50%;
  background: #ffffff;
  border: 2px solid rgba(201,168,76,0.55);
  box-shadow:
    0 0 0 8px rgba(46,107,63,0.06),
    0 12px 40px rgba(46,107,63,0.15);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  margin-bottom: 24px;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both;
}
.logo-wrap img {
  width: 138px; height: 138px;
  object-fit: contain;
}

/* Gold line */
.gold-line {
  width: 48px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 20px;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s both;
}

/* Product label */
.product-label {
  font-family: 'Fraunces', serif;
  font-style: italic; font-weight: 300;
  font-size: 15px; letter-spacing: 0.3px;
  color: #1a4025;
  margin-bottom: 24px;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.25s both;
}

/* Progress */
.progress-wrap {
  width: 180px;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  margin-bottom: 20px;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.3s both;
}
.progress-track {
  width: 100%; height: 1.5px;
  background: rgba(46,107,63,0.15);
  border-radius: 2px; overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--gold));
  width: 0%; transition: width linear;
}
.progress-text {
  font-size: 9px; font-weight: 600;
  letter-spacing: 3px; text-transform: uppercase;
  color: #2e6b3f;
}

/* Destination chip */
.dest-chip {
  display: flex; align-items: center; gap: 8px;
  background: rgba(46,107,63,0.07);
  border: 0.8px solid rgba(46,107,63,0.25);
  border-radius: 100px;
  padding: 8px 20px;
  font-size: 11px; font-weight: 500;
  color: #1a4025;
  margin-bottom: 14px;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.35s both;
}
.dest-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity:0.7; } 50% { opacity:0.15; }
}

/* Manual link */
.manual-link {
  font-size: 10px; font-weight: 300;
  color: #2e6b3f;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s both;
}
.manual-link a {
  color: var(--green); text-decoration: none;
  border-bottom: 0.5px solid rgba(46,107,63,0.3);
  padding-bottom: 1px;
}

/* Tagline bottom */
.tagline {

  font-style: italic; font-size: 11px; font-weight: 300;
  color: #2e6b3f;
  letter-spacing: 1px; z-index: 1;
}
